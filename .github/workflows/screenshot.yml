name: Screenshot on Deploy

# Vercel が GitHub に deployment_status を通知した瞬間にトリガー
on:
  deployment_status:

jobs:
  screenshot:
    # Production デプロイが成功したときだけ実行
    if: |
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment == 'Production'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # スクショをコミットするので書き込みトークンが必要
          token: ${{ secrets.GITHUB_TOKEN }}
          # 最新の main を取得（他のコミットが先行している場合も考慮）
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Create screenshots directory
        run: mkdir -p screenshots

      - name: Take screenshot
        run: node scripts/screenshot.js
        env:
          COMMIT_SHA: ${{ github.event.deployment.sha }}
          TARGET_URL: https://dj-discovery-ihhs.vercel.app

      - name: Commit and push screenshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots/
          # 新しいファイルがあるときだけコミット
          if git diff --staged --quiet; then
            echo "No new screenshot to commit"
          else
            git commit -m "screenshot: $(ls screenshots/ | tail -1)"
            git pull --rebase origin main
            git push origin main
          fi
